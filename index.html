<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's the Play?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.6;color:#1a1a1a;background:#fff;padding:2rem 1rem}
.wrap{max-width:680px;margin:0 auto}
.pbar{height:3px;background:#e5e7eb;border-radius:2px;margin-bottom:2rem}
.pfill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.4s}
.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#1D9E75;margin-bottom:0.7rem}
.big-title{font-size:24px;font-weight:600;line-height:1.25;margin-bottom:1rem}
.body-text{font-size:14px;color:#555;line-height:1.75;margin-bottom:1.1rem}
.body-text p{margin-bottom:0.75rem}
.body-text p:last-child{margin-bottom:0}
.body-text strong{color:#1a1a1a;font-weight:600}
.divider{height:1px;background:#e5e7eb;margin:1.25rem 0}
.sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-bottom:0.65rem}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem}
.pill{font-size:12px;padding:4px 10px;border-radius:20px;background:#E1F5EE;border:1px solid #9FE1CB;color:#085041}
.pill.gray{background:#f3f4f6;border-color:#d1d5db;color:#6b7280}
.intro-note{font-size:13px;color:#666;line-height:1.65;margin-bottom:1.5rem}
.qlbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-bottom:0.4rem}
.qtext{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:0.4rem}
.hint{font-size:13px;color:#666;line-height:1.7;margin-bottom:1.3rem}
.hint strong{color:#1a1a1a;font-weight:600}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.4rem}
.opt{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1px solid #d1d5db;border-radius:8px;cursor:pointer;background:#fff;text-align:left;width:100%;transition:border-color 0.15s,background 0.15s}
.opt:hover{border-color:#9ca3af;background:#f9fafb}
.opt.sel{border-color:#1D9E75;background:#E1F5EE}
.ring{width:17px;height:17px;border-radius:50%;border:1.5px solid #d1d5db;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.opt.sel .ring{background:#1D9E75;border-color:#1D9E75}
.dot{width:6px;height:6px;border-radius:50%;background:white;display:none}
.opt.sel .dot{display:block}
.ot{font-size:14px;line-height:1.5;color:#1a1a1a}
.os{display:block;font-size:12px;color:#888;margin-top:2px;line-height:1.45}
.opt.sel .os{color:#0F6E56}
.nav{display:flex;gap:10px}
.btn{padding:8px 20px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #d1d5db;background:#fff;color:#1a1a1a;transition:background 0.15s;font-family:inherit}
.btn:hover{background:#f3f4f6}
.btn.pri{background:#1D9E75;border-color:#1D9E75;color:white;font-weight:600}
.btn.pri:hover{background:#0F6E56}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:1rem;letter-spacing:0.02em}
.rtitle{font-size:21px;font-weight:600;margin-bottom:0.8rem;line-height:1.3}
.rintro{font-size:15px;line-height:1.75;color:#555;margin-bottom:1rem;border-left:3px solid #1D9E75;padding-left:14px}
.rintro.amb{border-left-color:#EF9F27}
.rintro.red{border-left-color:#E24B4A}
.tcards{display:flex;flex-direction:column;gap:8px;margin-bottom:0.5rem}
.tc{border:1px solid #d1d5db;border-radius:8px;padding:11px 14px;background:#fff}
.tc.pri{border-color:#1D9E75;background:#E1F5EE}
.tct{font-size:13px;font-weight:600;margin-bottom:3px;color:#1a1a1a}
.tc.pri .tct{color:#085041}
.tcb{font-size:12px;color:#666;line-height:1.6}
.tc.pri .tcb{color:#0F6E56}
.steps{display:flex;flex-direction:column;gap:9px;margin-bottom:0.5rem}
.si{display:flex;gap:11px;align-items:flex-start}
.sn{width:21px;height:21px;border-radius:50%;background:#E1F5EE;color:#085041;font-size:11px;font-weight:600;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.st{font-size:13px;line-height:1.6;color:#1a1a1a;padding-top:2px}
.co{border-radius:0 8px 8px 0;padding:11px 14px;font-size:13px;line-height:1.65;margin-bottom:0.75rem}
.co.amb{background:#FAEEDA;color:#412402;border-left:3px solid #EF9F27}
.co.grn{background:#E1F5EE;color:#085041;border-left:3px solid #1D9E75}
.co.blu{background:#E6F1FB;color:#042C53;border-left:3px solid #378ADD}
.co strong{font-weight:600}
.sumbox{background:#f9fafb;border-radius:8px;padding:13px 15px;margin-bottom:1.5rem;font-size:12px;line-height:1.6;border:1px solid #e5e7eb}
.sumtitle{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin-bottom:8px}
.srow{display:flex;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.slbl{color:#888;min-width:140px;flex-shrink:0}
.sval{color:#1a1a1a;font-weight:600;flex:1}
.pnote{background:#f9fafb;border-radius:8px;padding:13px 15px;margin-top:1.25rem;font-size:13px;line-height:1.65;color:#666;border:1px solid #e5e7eb}
.pnote strong{color:#1a1a1a;font-weight:600}
.restart{margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid #e5e7eb}
</style>
</head>
<body>
<div class="wrap">
  <div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div id="scr"></div>
  <div id="res" style="display:none"></div>
</div>
<script>
const S={phase:'intro',step:0,a:{}};

const Q=[
  {id:'goal',lbl:'Your goal',
   q:'What are you trying to accomplish?',
   hint:'Pick the one that best matches your main goal right now. <strong>A note on terminology:</strong> "Legislators" means people currently serving in the legislature. Candidates who are not currently serving are distinct — that distinction matters for which programs are available. Any legislator you would target through this kind of work is also a candidate by definition. The meaningful question is whether your targets are currently serving.',
   opts:[
    {v:'influence',  t:'Influence legislators\' and/or candidates\' positions on MAID', s:'Move people toward support — whether currently serving or running for office'},
    {v:'find_pos',   t:'Find out where legislators or candidates stand on MAID',        s:'You need position intelligence you don\'t currently have'},
    {v:'support',    t:'Help a pro-MAID candidate get elected',                         s:'Positions are known — you want to engage in the race'},
    {v:'engage_vol', t:'Engage or mobilize our volunteer base',                         s:'Keep supporters active and connected between sessions'},
   ]},

  {id:'targets',lbl:'Targeting',
   q:'Have you identified specific priority targets for this work?',
   hint:'This means you\'ve done the analysis — you know which legislators or races matter, and why. A general sense of "important districts" doesn\'t count.',
   opts:[
    {v:'yes',     t:'Yes — I have a clear, prioritized list with a rationale for each'},
    {v:'partial', t:'Somewhat — rough sense but not formally prioritized', s:'Some targets feel obvious but I haven\'t done the full analysis'},
    {v:'no',      t:'Not yet — I haven\'t done targeting work'},
   ],
   showIf:a=>['influence','find_pos'].includes(a.goal)},

  {id:'composition',lbl:'Target composition',
   q:'Do all of the races or seats you\'re targeting have an incumbent legislator?',
   hint:'An incumbent legislator is someone currently serving who is running for re-election in that seat. Races or seats without an incumbent — open seats, seats where the incumbent isn\'t on your list, or challengers running against a non-target — choose the second option.',
   opts:[
    {v:'all_legs',    t:'Yes — every seat on my list has an incumbent legislator as a target'},
    {v:'has_non_inc', t:'No — some or all seats have no incumbent legislator on my list', s:'Includes open seats, challengers, and any race where the current legislator isn\'t a target'},
   ],
   showIf:a=>a.goal==='influence' && a.targets==='yes'},

  {id:'leg_seats',lbl:'Seat competitiveness',
   q:'How would you describe the seats your target legislators are in?',
   hint:'This shapes which tools are most effective and how your program reads from a compliance standpoint.',
   opts:[
    {v:'all_swing',   t:'All or most are competitive (swing) races'},
    {v:'mixed_seats', t:'A mix — some competitive, some safe'},
    {v:'all_safe',    t:'All or most are safe seats'},
    {v:'unknown',     t:'Not sure — haven\'t analyzed competitiveness yet'},
   ],
   showIf:a=>a.goal==='influence' && a.targets==='yes' && a.composition==='all_legs'},

  {id:'leg_pos_swing',lbl:'Target positions',
   q:'How would you describe the positions of your target legislators on MAID?',
   hint:'"On the fence" means they genuinely haven\'t committed — not just that you don\'t know their position. If you don\'t know positions, that\'s a separate problem to solve first.',
   opts:[
    {v:'all_fence',   t:'All or most are on the fence or noncommittal',        s:'The clearest case for an influence program'},
    {v:'mix_w_fence', t:'A mix — some fence-sitters alongside supporters and/or opponents'},
    {v:'all_support', t:'All or most support MAID'},
    {v:'all_oppose',  t:'All or most oppose MAID'},
    {v:'no_fence',    t:'A mix of supporters and opponents — no fence-sitters'},
   ],
   showIf:a=>a.goal==='influence' && a.targets==='yes' && a.composition==='all_legs' && a.leg_seats==='all_swing'},

  {id:'leg_positions',lbl:'Target positions',
   q:'How would you describe the positions of your target legislators on MAID?',
   hint:'"On the fence" means they genuinely haven\'t committed — not just that you don\'t know their position. If you don\'t know positions, that\'s a separate problem to solve first.',
   opts:[
    {v:'all_fence',   t:'All or most are on the fence or noncommittal',        s:'The clearest case for an influence program'},
    {v:'mix_w_fence', t:'A mix — some fence-sitters alongside supporters and/or opponents'},
    {v:'all_support', t:'All or most support MAID'},
    {v:'all_oppose',  t:'All or most oppose MAID'},
    {v:'no_fence',    t:'A mix of supporters and opponents — no fence-sitters'},
   ],
   showIf:a=>a.goal==='influence' && a.targets==='yes' && a.composition==='all_legs' && ['all_safe','mixed_seats'].includes(a.leg_seats)},

  {id:'cand_seats',lbl:'Race competitiveness',
   q:'How would you describe the races your targets are in?',
   hint:'Without the official capacity option available for non-serving candidates, competitive races are the primary context where ATC-style work is effective. How your list breaks across seat types also shapes how the program reads from a compliance standpoint.',
   opts:[
    {v:'all_swing',   t:'All or most are competitive (swing) races'},
    {v:'mixed_seats', t:'A mix — some competitive, some safe or open'},
    {v:'all_safe',    t:'All or most are safe seats or non-competitive'},
   ],
   showIf:a=>a.goal==='influence' && a.targets==='yes' && a.composition==='has_non_inc'},

  {id:'cand_pos',lbl:'Target positions',
   q:'How would you describe the positions of your target candidates on MAID?',
   hint:'"On the fence" means they genuinely haven\'t committed. If you don\'t know positions, you can\'t run an influence program — find out first.',
   opts:[
    {v:'all_fence',   t:'All or most are on the fence or genuinely unknown',   s:'The clearest case for ATC'},
    {v:'mix_w_fence', t:'A mix — some fence-sitters alongside supporters and/or opponents'},
    {v:'all_support', t:'All or most support MAID'},
    {v:'all_oppose',  t:'All or most oppose MAID'},
    {v:'no_fence',    t:'A mix of supporters and opponents — no fence-sitters'},
   ],
   showIf:a=>a.goal==='influence' && a.targets==='yes' && a.composition==='has_non_inc' && ['all_swing','mixed_seats'].includes(a.cand_seats)},

  {id:'stakes',lbl:'Legislative stakes',
   q:'How significant are these races or seats to your MAID legislative strategy?',
   hint:'Would the outcomes here meaningfully change what\'s possible in the next session — majority margins, committee composition, key relationships?',
   opts:[
    {v:'critical',    t:'Critical — could directly shift the legislative math on MAID'},
    {v:'significant', t:'Significant — matters but isn\'t the only path'},
    {v:'minor',       t:'I\'m not sure how these races connect to my legislative goals', s:'The link between these electoral targets and your legislative path isn\'t clear yet'},
   ],
   showIf:a=>{
     if(a.goal!=='influence'||a.targets!=='yes') return false;
     const legSwing = a.composition==='all_legs' && a.leg_seats==='all_swing' && ['all_fence','mix_w_fence'].includes(a.leg_pos_swing);
     const legSafe  = a.composition==='all_legs' && ['all_safe','mixed_seats'].includes(a.leg_seats) && ['all_fence','mix_w_fence'].includes(a.leg_positions);
     const cand     = a.composition==='has_non_inc' && ['all_swing','mixed_seats'].includes(a.cand_seats) && ['all_fence','mix_w_fence'].includes(a.cand_pos);
     return legSwing||legSafe||cand;
   }},

  {id:'vols',lbl:'Volunteer capacity',
   q:'What\'s your volunteer capacity in these target districts?',
   hint:'ATC and constituent pressure live or die on volunteer execution. Past pilot programs have shown that even well-designed efforts produce very low volunteer completion rates without a solid base already in place. Be realistic.',
   opts:[
    {v:'strong',   t:'Strong — active, engaged volunteers in these districts already'},
    {v:'moderate', t:'Moderate — some supporters, need activation and support'},
    {v:'thin',     t:'Thin — little presence in these areas'},
   ],
   showIf:a=>{
     if(a.goal!=='influence'||a.targets!=='yes') return false;
     if(!['critical','significant'].includes(a.stakes)) return false;
     const legSwing = a.composition==='all_legs' && a.leg_seats==='all_swing' && ['all_fence','mix_w_fence'].includes(a.leg_pos_swing);
     const legSafe  = a.composition==='all_legs' && ['all_safe','mixed_seats'].includes(a.leg_seats) && ['all_fence','mix_w_fence'].includes(a.leg_positions);
     const cand     = a.composition==='has_non_inc' && ['all_swing','mixed_seats'].includes(a.cand_seats) && ['all_fence','mix_w_fence'].includes(a.cand_pos);
     return legSwing||legSafe||cand;
   }},
];

function vq(){return Q.filter(q=>!q.showIf||q.showIf(S.a));}
function pct(){
  if(S.phase==='intro') return 0;
  const v=vq(),idx=v.findIndex(q=>q.id===Q[S.step]?.id);
  if(idx<0) return 100;
  return Math.round(8+(idx/v.length)*84);
}
function setPf(){document.getElementById('pf').style.width=pct()+'%';}
function tc(t,b,p){return '<div class="tc'+(p?' pri':'')+'"><div class="tct">'+t+'</div><div class="tcb">'+b+'</div></div>';}
function si(n,t){return '<div class="si"><div class="sn">'+n+'</div><div class="st">'+t+'</div></div>';}
function sumHtml(){
  const v=vq();
  const rows=v.map(q=>{const o=q.opts.find(x=>x.v===S.a[q.id]);return o?'<div class="srow"><span class="slbl">'+q.lbl+'</span><span class="sval">'+o.t+'</span></div>':''}).join('');
  return '<div class="sumbox"><div class="sumtitle">Your responses</div>'+rows+'</div>';
}

function renderIntro(){\n  S.phase='intro';setPf();\n  document.getElementById('res').style.display='none';\n  document.getElementById('scr').innerHTML=\n    '<div class="eyebrow">Electoral &amp; Legislative Activity Planner</div>'+\n    '<div class="big-title">What\'s the play?</div>'+\n    '<div class="body-text">'+\n      '<p>Connecting electoral activity to legislative strategy is genuinely complicated. There are a lot of tools available — ATC, candidate questionnaires, pledges, scorecards, constituent pressure — and the difference between using them well and using them poorly often comes down to whether the activity is clearly connected to a specific legislative goal, aimed at the right targets, and matched to the capacity you actually have.</p>'+\n      '<p>This tool exists to help make that connection explicit. It walks you through the key questions — what are you trying to accomplish, who are your targets, what do you know about them, what capacity do you have — and points you toward the activity most likely to actually move the needle, along with specific guidance on next steps. It isn\'t a substitute for strategic judgment, but it can help surface the right questions before you commit capacity to a program.</p>'+\n      '<p><strong>The best time to use this is before session ends</strong> — ideally while you\'re still in the middle of your legislative campaign and can build electoral activity into the plan rather than bolting it on afterward. If session is already over or elections are close, it\'s still useful, but the earlier the better.</p>'+\n      '<p>The activities here aren\'t separate from your legislative campaign. They\'re extensions of it — ways to use the electoral calendar to build pressure, lock in commitments, and shape the landscape before the next session starts. If you\'re not sure where to start, or the tool raises questions you don\'t know how to answer, Patrick is available to work through it with you. You don\'t need to have everything figured out before reaching out.</p>'+\n    '</div>'+\n    '<div class="divider"></div>'+\n    '<div class="sec-lbl">Tools covered in this planner</div>'+\n    '<div class="pills">'+\n      '<span class="pill">Ask the Candidate</span>'+\n      '<span class="pill">Constituent pressure on legislators</span>'+\n      '<span class="pill">Candidate questionnaire</span>'+\n      '<span class="pill">Candidate pledge</span>'+\n      '<span class="pill">Candidate scorecard</span>'+\n      '<span class="pill">Legislative scorecard</span>'+\n      '<span class="pill gray">Partisan electoral engagement ↗</span>'+\n    '</div>'+\n    '<div class="intro-note">The grayed item — partisan electoral engagement — is a different legal and organizational bucket. This tool will point you toward it when it\'s the right answer and explain the distinction, but it won\'t walk you through it. That conversation happens with Patrick.</div>'+\n    '<button class="btn pri" onclick="startQ()">Get started</button>';\n}

function startQ(){S.phase='q';S.step=0;renderQ();}
function renderQ(){
  const v=vq(),vi=v.findIndex(q=>q.id===Q[S.step]?.id);
  if(vi<0||S.step>=Q.length){buildResult();return;}
  const q=v[vi];setPf();
  document.getElementById('scr').innerHTML=
    '<div class="qlbl">Question '+(vi+1)+' of '+v.length+'</div>'+
    '<div class="qtext">'+q.q+'</div>'+
    '<div class="hint">'+q.hint+'</div>'+
    '<div class="opts" id="opts"></div>'+
    '<div class="nav">'+
      '<button class="btn" onclick="goBack()" '+(vi===0?'style="visibility:hidden"':'')+'>Back</button>'+
      '<button class="btn pri" id="nb" onclick="goNext()" '+(S.a[q.id]?'':'disabled')+'>Continue</button>'+
    '</div>';
  const el=document.getElementById('opts');
  q.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt'+(S.a[q.id]===o.v?' sel':'');
    b.innerHTML='<span class="ring"><span class="dot"></span></span><span class="ot">'+o.t+(o.s?'<span class="os">'+o.s+'</span>':'')+'</span>';
    b.onclick=()=>{S.a[q.id]=o.v;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');const nb=document.getElementById('nb');if(nb)nb.disabled=false;};
    el.appendChild(b);
  });
}
function goNext(){const v=vq(),vi=v.findIndex(q=>q.id===Q[S.step]?.id);if(vi<v.length-1){S.step=Q.findIndex(q=>q.id===v[vi+1].id);renderQ();}else buildResult();}
function goBack(){const v=vq(),vi=v.findIndex(q=>q.id===Q[S.step]?.id);if(vi>0){S.step=Q.findIndex(q=>q.id===v[vi-1].id);renderQ();}}
function restart(){S.step=0;S.a={};document.getElementById('res').style.display='none';renderIntro();}

function posFor(a){
  if(a.composition==='all_legs') return a.leg_seats==='all_swing' ? a.leg_pos_swing : a.leg_positions;
  return a.cand_pos;
}


function posFor(a){
  if(a.composition==='all_legs') return a.leg_seats==='all_swing' ? a.leg_pos_swing : a.leg_positions;
  return a.cand_pos;
}

// ─── reusable snippets ───────────────────────────────────────
const OFFICIAL_CAP_DEF='<p><strong>A note on official capacity:</strong> "Official capacity" means targeting a legislator in their role as a legislator — not as a candidate. They may also be a candidate, but at official-capacity events they are wearing their legislator hat. A practical test: if an event has no "paid for by" disclaimer, it is likely an official event and qualifies. If it does carry that disclaimer, it is a political event and does not qualify for official capacity work.</p>';

const QUESTIONNAIRE_NOTE='<p><strong>On questionnaires:</strong> Decide in advance whether you want candidate responses to be public or private among staff only. A private questionnaire is likely to get more transparent responses; a public questionnaire provides a later opportunity for public accountability. Note that direct phone contact is usually faster than sending a questionnaire even with a long target list — the two approaches serve different purposes and can be combined, but a phone call gets more candid information while a questionnaire creates a formal paper trail.</p>';

const PNOTE='<div class="pnote"><strong>A note on partisan electoral work.</strong> Endorsements, independent expenditures, and direct candidate support are part of the broader toolbox — but they live in a separate legal and organizational bucket from everything covered here. Electoral engagement capacity and what\'s permissible varies significantly by state — if your analysis points toward that kind of engagement, the conversation with Patrick will include understanding what\'s actually available in your state before any program design happens. It\'s not off the table; it just requires its own process.</div>';

// ─── shared result builders ──────────────────────────────────
function rTargetingFirst(a,body2){
  return {
    badge:'Targeting first',bs:'background:#FAEEDA;color:#412402',ic:'amb',
    title:'Name your targets before you name your tactics.',
    intro:'The program design can\'t happen before the targeting analysis — and a list of 15 priorities is the same as no priorities at all.',
    body:'<p>Without a clear, manageable target list you end up at one of two bad places: a scattered effort that spreads capacity too thin, or a program so broad it can\'t be executed meaningfully. The specificity of the targeting rationale is a critical part of what makes a program successful — strategically and from a compliance standpoint. Breadth and depth of targeting have to sync up with the actual capacity you have to execute.</p><p>For each name or race on your list, you should be able to answer all of the following: What is the specific legislative barrier this person represents — are they a committee chair blocking a hearing, a swing vote on the floor, a member of a key caucus? Are they in the House or Senate, and does that matter for your current path? What did they do or not do last session that makes them a target now? Are they in a competitive race? Do we have any volunteer presence in their district? If you can\'t answer those questions for a target, they probably shouldn\'t be on the list yet.</p>'+(body2||'')+'<p>Not every target needs the same depth of program. Think in tiers. Tier 1 targets — your highest-priority, most impactful, most feasible — warrant a full-depth program like ATC or official capacity work. Tier 2 targets might get something lighter: a digital-first approach, a candidate pledge ask, or a questionnaire. Tier 3 might just be a statewide broadcast email that keeps the issue visible with minimal operational cost. The tiering should be explicit, with a clear rationale for why each target belongs where they do and why the specific activity fits the specific situation.</p>',
    tactics:'',
    steps:[
      'Start with your existing legislative campaign target list and layer in political information: is each legislator up for re-election this cycle? Has any opponent filed for that race? How competitive is the district based on recent results? This takes less than an hour of research on Ballotpedia.com and can eliminate many targets right away.',
      'Schedule a session debrief with your lobbyist — ask specifically: who moved, who blocked, who was genuinely persuadable, and what would change their calculus? This conversation will tell you more than any formal analysis.',
      'Draft a target list of no more than 5–7 names or races, with a one-sentence rationale for each: what is their specific role in blocking or advancing MAID, and why are they movable?',
      'For each target, note: House or Senate? Committee role? Competitive seat or safe? Any existing relationship with staff or lobbyist? Did they take a specific action on MAID last session you can point to?',
      'Assign each target to a tier based on legislative significance and your capacity to engage: Tier 1 (full-depth program), Tier 2 (lighter digital or pledge approach), Tier 3 (broadcast or passive visibility). The tier assignment should be explicit and justifiable.',
      'Cut any target where you can\'t articulate a clear theory for how pressure from constituents changes their position or behavior — if you can\'t name the mechanism, they\'re not a real target yet.',
      'Bring the tiered list and rationales to Patrick before designing any program.'
    ],
    cos:[],
    gaps:[
      'I have not yet built a prioritized target list with a clear rationale for each name.',
      'I need to complete a session debrief with my lobbyist to identify who is genuinely movable.',
      'I need to assess seat competitiveness for each potential target and assign them to tiers.',
      'I have not yet articulated the specific legislative barrier my program would be trying to move.'
    ]
  };
}

function rCapacityGap(){
  return {
    badge:'Capacity gap',bs:'background:#FAEEDA;color:#412402',ic:'amb',
    title:'The conditions are right. The volunteer capacity isn\'t — yet.',
    intro:'A weak program can be worse than no program. It burns staff time and volunteer trust without results.',
    body:'<p>Past pilot programs have shown that even well-designed efforts produce very low volunteer completion rates when the infrastructure to execute them isn\'t already in place. Constituent pressure and ATC work when volunteers are already engaged and looking for ways to contribute. They don\'t work as volunteer acquisition mechanisms. The investment right now is building your base in these districts so the capacity exists when the next opening comes.</p><p>That said, there are lower-capacity options that can keep the issue visible and lay groundwork for future cycles without requiring a mobilized volunteer base. ATC is one tool in the toolkit — it\'s the highest-investment option for highest-priority targets. When volunteer capacity is thin, the right move is to match the activity to the capacity you actually have, not the capacity you wish you had.</p>',
    tactics:'<div class="sec-lbl" style="margin-top:1.25rem">Lower-capacity alternatives for this cycle</div><div class="tcards">'+tc('Statewide broadcast email','A single email to all supporters asking them to reach out to their own candidates or legislators. No district-level targeting, no volunteer coordination, no reporting infrastructure required. You won\'t get much actionable intelligence back, but it keeps the issue visible at near-zero operational cost.',true)+tc('Candidate questionnaire via staff','Direct written outreach from staff to campaigns asking for their position on MAID. No volunteers required — establishes a paper trail and starts a relationship without needing constituent infrastructure. Decide in advance whether responses will be public or private. Work with Patrick to develop the questionnaire language and distribution list.')+tc('Lobbyist-level outreach','For your highest-priority targets, direct staff or lobbyist contact is more efficient than any volunteer program when the volunteer base is thin. It also starts the relationship that matters most if they win or stay in office.')+tc('Candidate and legislator education','A lower-capacity but often underused option. At one end: a staffer sitting down with a candidate for an hour to walk through questions and the details of the policy. At the other: developing a one-pager on the politics of MAID — including recent statewide polling — that can be sent broadly to multiple candidates or shared at events. A digestible policy explainer can open doors that constituent pressure alone can\'t.')+'</div>',
    steps:[
      'Pull your supporter list for each target district from EveryAction — look for anyone who has taken action in the last 12 months; these are your warmest potential volunteers. Reach out to Patrick or the database team if you need help with this.',
      'Identify 1–2 people in each district who could serve as a local point of contact — an action team leader, a past event attendee, someone who has called their legislator before.',
      'Reach out personally (not by broadcast email) to those individuals to gauge interest in more active involvement — this is the organizing work that builds the base.',
      'For this cycle, choose one lower-capacity alternative from the options above that fits what you can actually execute well — doing one thing well is better than three things poorly.',
      'Flag these districts explicitly in your campaign plan as capacity-building priorities for the next cycle.'
    ],
    cos:[],
    gaps:[
      'I have identified good target races but do not yet have a volunteer base in those districts.',
      'I need help identifying which lower-capacity alternative (broadcast email, questionnaire, lobbyist outreach, candidate education) is the best fit for this cycle.',
      'I need a supporter acquisition strategy for the priority regions so I can build capacity before the next cycle.'
    ]
  };
}

function rLowPriority(){
  return {
    badge:'Connection unclear',bs:'background:#FAEEDA;color:#412402',ic:'amb',
    title:'Before designing a program, map how these races connect to your legislative path.',
    intro:'The link between electoral targets and legislative goals isn\'t always obvious — but it needs to be explicit before you can design a program worth running.',
    body:'<p>Electoral engagement makes the most sense when you can clearly articulate how the outcome of a race — or the pressure created by activity in a race — advances your legislative goal. That connection can be direct or indirect.</p><p><strong>Direct connection:</strong> The person in this race IS your legislative target. They\'re a current legislator running for re-election, they sit on a key committee, they\'re a swing vote you need. Winning or losing this race, or changing their position in this race, directly changes what\'s possible on MAID in the next session.</p><p><strong>Indirect connection:</strong> The person in this race isn\'t your primary target, but their race affects someone who is. A competitive primary in a neighboring district puts pressure on your fence-sitting legislator. A shift in the majority changes committee composition. A new member in a key seat changes the relationship dynamics around your bill. These indirect connections are real and worth pursuing — but they require more explicit articulation to be defensible.</p><p>If you can\'t clearly describe which type of connection applies to each race on your list, that\'s the work to do before coming back to this tool.</p>',
    tactics:'',
    steps:[
      'For each race on your list, write one sentence that completes this prompt: "Activity in this race advances our MAID legislative goal because ___." If you can\'t complete the sentence, that race isn\'t ready to be a target yet.',
      'Think through indirect connections: does this race affect majority math in the chamber where your bill is stuck? Does it affect a key committee? Does it put pressure on a legislator who is already on your target list?',
      'Talk to your lobbyist about which races they\'re watching and why — they often have a clearer picture of how electoral outcomes affect legislative dynamics than field staff do.',
      'Once you can articulate the connection for each race, return to this tool — you\'ll likely find the stakes question answers itself once the rationale is written down.',
      'Bring your completed rationale document to Patrick — the electoral-to-legislative connection is exactly what the conversation about program design should start from.'
    ],
    cos:[],
    gaps:[
      'I have not yet mapped the direct or indirect connection between each race on my list and our specific legislative barrier on MAID.',
      'I need help thinking through whether any of these races connect indirectly to our legislative targets (majority math, committee composition, pressure on a fence-sitter).',
